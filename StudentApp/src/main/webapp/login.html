<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body
	style="margin: 0; padding: 0; font-family: Arial, sans-serif; background: linear-gradient(to right, #667eea, #764ba2);">

	<div
		style="width: 350px; margin: 100px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);">

		<h2 style="text-align: center; color: #333; margin-bottom: 20px;">Login</h2>

		<form action="login" method="post">

			<input type="text" name="username" placeholder="Enter Username"
				required
				style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px;">

			<input type="password" name="password" placeholder="Enter Password"
				required
				style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px;">

			<button type="submit"
				style="width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px;">
				Login</button>

			<p style="text-align: center; margin-top: 10px;">
				<a href="forgot.html" style="color: #667eea; text-decoration: none;">
					Forgot Password? </a>
			</p>

			<p style="text-align: center; margin-top: 10px;">
				New user? <a href="register.html"
					style="color: #667eea; text-decoration: none;"> Register here </a>
			</p>

		</form>

	</div>

</body>
</html>
