<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body style="font-family:Arial; background:#f2f2f2;">

<div style="width:350px; margin:100px auto; background:white; padding:20px; border-radius:10px; text-align:center;">

    <h2>Forgot Password</h2>

    <form action="forgot" method="post">
        <input type="text" name="username" placeholder="Enter Username" required
        style="width:100%; padding:10px; margin:10px 0;">

        <button type="submit" style="padding:10px; width:100%; background:#667eea; color:white;">
            Get Password
        </button>
    </form>

</div>

</body>
</html>
