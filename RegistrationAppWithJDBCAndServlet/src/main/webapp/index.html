<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Servlet Registration</title>
</head>

<body
	style="margin: 0; background: linear-gradient(135deg, #4facfe, #00f2fe); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif;">

	<form method="post" action="RegisterServlet"
		style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); width: 320px;">

		<h2 style="text-align: center; margin-bottom: 20px; color: #333;">User
			Registration</h2>

		<table style="width: 100%;">

			<tr>
				<td style="padding: 8px 0; font-weight: bold;">User Name</td>
			</tr>

			<tr>
				<td><input type="text" name="uname"
					style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; outline: none;">
				</td>
			</tr>

			<tr>
				<td style="padding: 8px 0; font-weight: bold;">Email</td>
			</tr>

			<tr>
				<td><input type="text" name="email"
					style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; outline: none;">
				</td>
			</tr>

			<tr>
				<td style="padding: 8px 0; font-weight: bold;">Password</td>
			</tr>

			<tr>
				<td><input type="password" name="password"
					style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; outline: none;">
				</td>
			</tr>

			<tr>
				<td style="padding: 8px 0; font-weight: bold;">City</td>
			</tr>

			<tr>
				<td><input type="text" name="ucity"
					style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; outline: none;">
				</td>
			</tr>

			<tr>
				<td style="padding-top: 20px;"><input type="submit"
					value="Register"
					style="width: 100%; padding: 12px; background: #4facfe; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s;">
				</td>
			</tr>

		</table>

	</form>

</body>
</html>
