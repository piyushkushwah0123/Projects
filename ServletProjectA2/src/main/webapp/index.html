<!DOCTYPE html>
<html>
<head>
<title>Employee Form</title>
</head>

<body style="font-family:Arial; background:#f2f2f2; text-align:center;">

<h2 style="color:green;">Employee Details Form</h2>

<form action="employee" method="post"
style="background:white; width:350px; margin:auto; padding:20px; border-radius:10px; box-shadow:0px 0px 10px gray;">

<label style="font-weight:bold;">Employee Name:</label><br>
<input type="text" name="name" style="width:90%; padding:8px;"><br><br>

<label style="font-weight:bold;">Email:</label><br>
<input type="email" name="email" style="width:90%; padding:8px;"><br><br>

<label style="font-weight:bold;">City:</label><br>
<input type="text" name="city" style="width:90%; padding:8px;"><br><br>

<label style="font-weight:bold;">Age:</label><br>
<input type="number" name="age" style="width:90%; padding:8px;"><br><br>

<label style="font-weight:bold;">Department:</label><br>
<input type="text" name="dept" style="width:90%; padding:8px;"><br><br>

<input type="submit" value="Submit"
style="background:blue; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">

</form>

</body>
</html>
